<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 260" width="100%" height="100%">
  <!-- Icon (Triangle) -->
  <g fill="none" stroke="currentColor" stroke-width="6" stroke-linejoin="round" stroke-linecap="round">
    <!-- Outer Triangle -->
    <polygon points="120,20 30,150 210,150" />
    
    <!-- Horizontal Division Lines -->
    <!-- Line 1 (Inside top triangle) -->
    <line x1="109" y1="38" x2="131" y2="38" />
    <!-- Line 2 (Base of top triangle) -->
    <line x1="97" y1="56" x2="143" y2="56" />
    <!-- Line 3 (Base of middle section) -->
    <line x1="72" y1="94" x2="168" y2="94" />
    
    <!-- Diagonal Stripes in the bottom section (between y=94 and y=150) -->
    <line x1="78" y1="150" x2="110" y2="94" stroke-width="5" />
    <line x1="102" y1="150" x2="134" y2="94" stroke-width="5" />
    <line x1="126" y1="150" x2="158" y2="94" stroke-width="5" />
    <line x1="150" y1="150" x2="182" y2="94" stroke-width="5" />
    <line x1="174" y1="150" x2="206" y2="94" stroke-width="5" />
  </g>
  
  <!-- Text: EAD -->
  <text x="120" y="210" 
        font-family="'Outfit', 'Inter', sans-serif" 
        font-weight="300" 
        font-size="54" 
        fill="currentColor" 
        letter-spacing="12" 
        text-anchor="middle"
        style="text-transform: uppercase;">
    E<tspan dy="-2" font-size="56">Λ</tspan>D
  </text>

  <!-- Text: ENGENHARIA DELTA -->
  <text x="120" y="240" 
        font-family="'Outfit', 'Inter', sans-serif" 
        font-weight="700" 
        font-size="12" 
        fill="currentColor" 
        letter-spacing="4" 
        text-anchor="middle">
    ENGENHARIA DELTA
  </text>
</svg>
